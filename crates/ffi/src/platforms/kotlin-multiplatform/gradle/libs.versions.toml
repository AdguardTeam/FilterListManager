[versions]
kotlin = "1.9.24"
agp = "8.4.0"
gradlekit = "2.0.24"
wire = "4.9.9"

# Build configuration
java = "17"
android-ndk = "28.1.13356709"
android-compile-sdk = "34"
android-min-sdk = "24"

# Test
androidx-test = "1.5.0"
androidx-test-ext = "1.1.5"
espresso = "3.5.1"

[libraries]
kotlin-stdlib-common = { module = "org.jetbrains.kotlin:kotlin-stdlib-common" }
kotlin-stdlib-jdk8 = { module = "org.jetbrains.kotlin:kotlin-stdlib-jdk8", version.ref = "kotlin" }
kotlin-test = { module = "org.jetbrains.kotlin:kotlin-test", version.ref = "kotlin" }
wire-runtime = { module = "com.squareup.wire:wire-runtime", version.ref = "wire" }
androidx-test-core = { module = "androidx.test:core", version.ref = "androidx-test" }
androidx-test-ext = { module = "androidx.test.ext:junit", version.ref = "androidx-test-ext" }
espresso-core = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso" }

[plugins]
kotlin-multiplatform = { id = "org.jetbrains.kotlin.multiplatform", version.ref = "kotlin" }
android-library = { id = "com.android.library", version.ref = "agp" }
wire = { id = "com.squareup.wire", version.ref = "wire" }
